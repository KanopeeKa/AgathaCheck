name: pet_profile_app
description: A modular Flutter app for managing pet profiles with clean architecture.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1
  shared_preferences: ^2.3.4
  image_picker: ^1.1.2
  uuid: ^4.5.1
  http: ^1.6.0
  intl: ^0.20.2
  fl_chart: ^0.69.2
  pdf: ^3.11.2
  printing: ^5.13.4
  web: ^1.1.0
  purchases_flutter: ^9.12.3
  purchases_ui_flutter: ^9.12.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  mockito: ^5.4.5
  build_runner: ^2.4.14

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/logo.png
    - assets/logo.jpg
    - assets/rainbow_wings.png
