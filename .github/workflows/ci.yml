# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Set up Flutter instead of plain Dart
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable  # or beta/master if you prefer

      - name: Install dependencies
        run: flutter pub get

      # Lint - Static analysis with flutter analyze
      - name: Analyze project source
        run: flutter analyze .

      # Test - Unit, widget, and integration tests with coverage
      - name: Run tests with coverage
        run: flutter test --coverage

      # Build - Web release build
      - name: Build web release
        run: flutter build web --release

      # Upload the web build as an artifact
      - name: Upload web artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: build/web/
