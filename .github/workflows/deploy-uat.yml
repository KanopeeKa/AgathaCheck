name: Deploy UAT (uat.agathatrack.com)

on:
  push:
    branches: [ 'release/uat-*' ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: UAT  # Add this
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable  # Or 'beta' if needed

      - name: Debug pubspec
        working-directory: flutter_app
        run: cat pubspec.yaml

      - name: Install dependencies & Build
        working-directory: flutter_app
        run: |
          flutter clean
          flutter pub get
          flutter build web --release --no-wasm-dry-run

      
      - name: Deploy to UAT cPanel
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.UAT_FTP_SERVER }}
          username: ${{ secrets.UAT_FTP_USERNAME }}
          password: ${{ secrets.UAT_FTP_PASSWORD }}
          server-dir: /public_html/UAT/
          local-dir: flutter_app/build/web/
