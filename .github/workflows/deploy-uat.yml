name: Deploy UAT (uat.agathatrack.com)

on:
  push:
    branches: [ 'release/uat-*' ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: UAT
    steps:
      - uses: actions/checkout@v4
      
      # ===== BUILD FRONTEND =====
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Build Flutter Web
        working-directory: flutter_app
        run: |
          flutter clean
          flutter pub get
          flutter build web --release --no-wasm-dry-run

      # ===== DEPLOY FRONTEND (Flutter Web) =====
      - name: Deploy Frontend to uat.agathatrack.com
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.UAT_FTP_SERVER }}
          username: ${{ secrets.UAT_FTP_USERNAME }}
          password: ${{ secrets.UAT_FTP_PASSWORD }}
          server-dir: ./public_html
          local-dir: flutter_app/build/web/
       #   dangerous-clean-slate: true

