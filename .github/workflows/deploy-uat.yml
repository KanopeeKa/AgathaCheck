name: Deploy UAT (uat.agathatrack.com)

on:
  push:
    branches: [ 'release/uat-*' ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: UAT  # Add this
    steps:
      - uses: actions/checkout@v4

       # Run DB migrations for UAT
      - name: Run Postgres migrations (Flyway)
        uses: docker://flyway/flyway:10
        env:
          FLYWAY_URL: jdbc:postgresql://127.0.0.1:5432/bixo5840_agathatrack_uat
          FLYWAY_USER: ${{ secrets.UAT_DB_USER }}
          FLYWAY_PASSWORD: ${{ secrets.UAT_DB_PASSWORD }}
        with:
          args: -locations=filesystem:db/migrations migrate
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable  # Or 'beta' if needed

      - name: Debug pubspec
        working-directory: flutter_app
        run: cat pubspec.yaml

      - name: Install dependencies & Build
        working-directory: flutter_app
        run: |
          flutter clean
          flutter pub get
          flutter build web --release --no-wasm-dry-run

      
      - name: Deploy to UAT cPanel
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.UAT_FTP_SERVER }}
          username: ${{ secrets.UAT_FTP_USERNAME }}
          password: ${{ secrets.UAT_FTP_PASSWORD }}
          server-dir: ./     # trailing /
          local-dir: flutter_app/build/web/    # trailing /
          dangerous-clean-slate: true
